<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- bus body -->
  <rect x="90" y="130" width="332" height="220" rx="32" fill="#FFFFFF"/>
  <!-- windshield -->
  <rect x="120" y="158" width="272" height="120" rx="16" fill="#1E3A8A"/>
  <!-- wheels -->
  <circle cx="160" cy="368" r="40" fill="#1E3A8A"/>
  <circle cx="160" cy="368" r="20" fill="#FFFFFF"/>
  <circle cx="352" cy="368" r="40" fill="#1E3A8A"/>
  <circle cx="352" cy="368" r="20" fill="#FFFFFF"/>
  <!-- headlights -->
  <rect x="94" y="268" width="44" height="28" rx="8" fill="#FCD34D"/>
  <!-- clock -->
  <circle cx="370" cy="318" r="72" fill="#1E3A8A" stroke="#FFFFFF" stroke-width="10"/>
  <line x1="370" y1="278" x2="370" y2="318" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="370" y1="318" x2="398" y2="336" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <!-- speed lines -->
  <line x1="40" y1="228" x2="88" y2="228" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity=".7"/>
  <line x1="28" y1="258" x2="88" y2="258" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity=".5"/>
  <line x1="48" y1="288" x2="88" y2="288" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity=".3"/>
  <!-- bottom text area -->
  <rect x="0" y="400" width="512" height="112" rx="0" fill="#1E3A8A" opacity=".6"/>
  <rect x="0" y="440" width="512" height="72" rx="0" fill="#1E3A8A" opacity=".4"/>
  <text x="256" y="455" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" letter-spacing="4">ROZKŁAD</text>
  <text x="256" y="498" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="46" fill="#FFFFFF" letter-spacing="4">JAZDY</text>
</svg>
