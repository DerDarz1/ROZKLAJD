<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rozkład Jazdy</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#09090B" id="theme-color-meta" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rozkład" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #09090B;
      --surface: #18181B;
      --text:    #FAFAFA;
      --muted:   #A1A1AA;
      --border:  #27272A;
      --live:    #34D399;
      --live-bg: #064E3B;
      --past:    #52525B;
    }
    body.light {
      --bg:      #FFFFFF;
      --surface: #F4F4F5;
      --text:    #09090B;
      --muted:   #71717A;
      --border:  #E4E4E7;
      --live:    #10B981;
      --live-bg: #ECFDF5;
      --past:    #A1A1AA;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      font-family: monospace;
    }
    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }
    #theme-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* MAIN */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* HERO — dwa kafelki */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .hero-card {
      border: 1.5px solid var(--live);
      background: var(--live-bg);
      border-radius: 8px;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 3px;
    }
    .hero-card.no-bus  { border-color: var(--border); background: var(--surface); }
    .hero-card.tomorrow { border-color: var(--border); background: var(--surface); }

    .hero-label-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--live);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    .hero-card.no-bus .live-dot,
    .hero-card.tomorrow .live-dot { background: var(--muted); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .hero-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--live);
    }
    .hero-card.no-bus .hero-label,
    .hero-card.tomorrow .hero-label { color: var(--muted); }

    .hero-time {
      font-size: 42px; font-weight: 900; letter-spacing: -2px;
      line-height: 1; font-family: monospace;
    }
    .hero-card.no-bus .hero-time { color: var(--muted); }

    .hero-countdown { font-size: 12px; color: var(--muted); letter-spacing: .3px; }
    .hero-when {
      font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--muted); text-transform: uppercase; margin-top: 2px;
    }
    .hero-carrier { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); margin-top: 2px; }

    /* DATE CHIP */
    .date-chip {
      font-size: 10px; letter-spacing: 2px; color: var(--muted);
      font-weight: 700; margin-top: 24px; display: block;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      color: var(--muted); margin-top: 20px; margin-bottom: 10px; display: block;
    }

    /* SEGMENTED CONTROL */
    .segmented {
      position: relative;
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      gap: 2px;
    }
    .seg-pill {
      position: absolute;
      top: 4px; bottom: 4px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: left .22s cubic-bezier(.4,0,.2,1), width .22s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
      z-index: 0;
    }
    .seg-btn {
      position: relative; z-index: 1;
      flex: 1; padding: 10px 8px;
      border-radius: 6px; border: 1px solid transparent;
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 800; letter-spacing: 1px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      transition: color .15s;
    }
    .seg-btn .sub { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
    .seg-btn.active { background: transparent !important; border-color: transparent !important; color: var(--text); }
    .seg-btn.dir-btn { font-size: 12px; font-weight: 700; padding: 12px 8px; flex-direction: row; gap: 0; letter-spacing: .5px; }

    /* LIST HEADER */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 4px; margin-bottom: 10px;
    }
    .count-badge {
      font-size: 10px; font-weight: 700; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 8px; letter-spacing: 1px;
    }

    /* BUS TRANSITION */
    #bus-transition {
      position: fixed; top: 50%; left: -160px;
      transform: translateY(-50%);
      font-size: 80px; line-height: 1;
      z-index: 9999; pointer-events: none;
      white-space: nowrap;
      filter: drop-shadow(0 4px 24px #000a);
    }
    #bus-transition.driving {
      animation: bus-drive .72s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes bus-drive {
      0%   { left: -160px; }
      45%  { left: calc(50% - 40px); }
      55%  { left: calc(50% - 40px); }
      100% { left: calc(100vw + 160px); }
    }

    /* SCHEDULE TRANSITION */
    #schedule-container { transition: opacity .2s ease, transform .2s ease; }
    #schedule-container.fade-out { opacity: 0; transform: translateY(6px); }

    /* TIME GRID */
    .time-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .time-cell {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 14px 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .time-cell.past  { opacity: .3; background: var(--bg); }
    .time-cell.next  { background: var(--live); border-color: var(--live); }
    .time-text { font-size: 18px; font-weight: 700; font-family: monospace; letter-spacing: -.5px; }
    .time-cell.past .time-text { color: var(--past); text-decoration: line-through; }
    .time-cell.next .time-text { color: #052E16; }
    .next-badge { font-size: 9px; font-weight: 800; color: #052E16; letter-spacing: .8px; margin-top: 3px; }

    /* EMPTY STATE */
    .empty-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 32px; border: 1px dashed var(--border);
      border-radius: 8px; background: var(--surface); text-align: center;
    }
    .empty-icon { font-size: 32px; color: var(--muted); }
    .empty-title { font-size: 18px; font-weight: 800; margin-top: 12px; }
    .empty-text { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* FOOTER */
    footer { margin-top: 32px; text-align: center; }
    .footer-text { font-size: 10px; color: var(--muted); letter-spacing: 2px; font-weight: 700; }
    .footer-small { font-size: 10px; color: var(--muted); margin-top: 4px; opacity: .7; }
  </style>
</head>
<body>

<div id="bus-transition">🚌</div>

<header>
  <div>
    <div class="header-title">ROZKŁAD</div>
    <div class="header-sub" id="header-sub"></div>
  </div>
  <button id="theme-btn" title="Zmień motyw">☀</button>
</header>

<main>
  <!-- HERO -->
  <div class="hero-grid">
    <div class="hero-card" id="hero-to-kielce">
      <div class="hero-label-row"><div class="live-dot"></div><span class="hero-label">DO KIELC</span></div>
      <div class="hero-time" id="hk-time">—</div>
      <div class="hero-countdown" id="hk-countdown"></div>
      <div class="hero-when" id="hk-when"></div>
      <div class="hero-carrier" id="hk-carrier"></div>
    </div>
    <div class="hero-card" id="hero-from-kielce">
      <div class="hero-label-row"><div class="live-dot"></div><span class="hero-label">Z KIELC</span></div>
      <div class="hero-time" id="hfk-time">—</div>
      <div class="hero-countdown" id="hfk-countdown"></div>
      <div class="hero-when" id="hfk-when"></div>
      <div class="hero-carrier" id="hfk-carrier"></div>
    </div>
  </div>

  <span class="date-chip" id="date-chip"></span>

  <span class="section-label">DZIEŃ</span>
  <div class="segmented" id="day-seg"></div>

  <span class="section-label">PRZEWOŹNIK</span>
  <div class="segmented" id="carrier-seg"></div>

  <span class="section-label">KIERUNEK</span>
  <div class="segmented" id="direction-seg"></div>

  <div class="list-header">
    <span class="section-label" id="schedule-label" style="margin:0"></span>
    <span class="count-badge" id="count-badge">0</span>
  </div>
  <div id="schedule-container"></div>

  <footer>
    <div class="footer-text">Dane rozkładowe · KOWMAR · MAJCHRAK</div>
    <div class="footer-small">Kursy orientacyjne — potwierdź u przewoźnika</div>
  </footer>
</main>

<script>
const CARRIERS = [
  {
    id: "kowmar-zwykly", name: "KOWMAR", subtitle: "zwykły",
    directions: [
      { id: "kz-ruda-kielce", from: "Ruda", to: "Kielce",
        times: { weekday: ["4:45","5:30","6:20","6:40","6:55","7:50","8:45","10:20","12:05","13:00","13:50","14:45","15:30","16:00","17:15","17:55","20:00"], saturday: ["4:45","6:30","8:15","10:15","12:20","14:20","16:00"] } },
      { id: "kz-kielce-ruda", from: "Kielce", to: "Ruda",
        times: { weekday: ["6:15","7:05","7:45","9:10","10:25","12:15","13:05","13:55","14:35","15:10","15:50","16:25","17:15","18:30","19:10","20:50"], saturday: ["5:30","7:20","9:15","11:25","13:20","15:10","17:15"] } },
    ]
  },
  {
    id: "kowmar-szybki", name: "KOWMAR", subtitle: "szybki",
    directions: [
      { id: "ks-ruda-kielce", from: "Ruda", to: "Kielce",
        times: { weekday: ["6:05","8:15","11:00","13:15","15:30"], saturday: [] } },
      { id: "ks-kielce-ruda", from: "Kielce", to: "Ruda",
        times: { weekday: ["5:30","6:45","8:55","11:45","14:50"], saturday: [] } },
    ]
  },
  {
    id: "majchrak", name: "MAJCHRAK", subtitle: "",
    directions: [
      { id: "m-kielce-wolka", from: "Kielce", to: "Wólka Kłucka",
        times: { weekday: ["6:00","7:15","8:00","9:20","10:35","12:25","13:45","15:15","16:30","17:45","18:50"], saturday: ["7:00","8:50","11:40","14:00","16:10","18:50"] } },
      { id: "m-wolka-kielce", from: "Wólka Kłucka", to: "Kielce",
        times: { weekday: ["5:05","6:15","8:15","10:15","12:25","13:25","14:45","16:00","17:20"], saturday: ["5:50","7:50","10:20","13:10","15:10","17:50"] } },
    ]
  }
];

function timeToMin(t) { const [h,m]=t.split(":").map(Number); return h*60+m; }

function formatCountdown(sec) {
  if (sec<=0) return "teraz";
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  if (h>0) return `${h}g ${m}min`;
  if (m>0) return `${m}min ${s}s`;
  return `${s}s`;
}

function getDayType(d) {
  const day=d.getDay();
  if (day===0) return "sunday";
  if (day===6) return "saturday";
  return "weekday";
}

function getDayLabel(dt) {
  if (dt==="weekday") return "Poniedziałek–Piątek";
  if (dt==="saturday") return "Sobota";
  return "Niedziela";
}

function findNextInDir(dir, now) {
  const dt=getDayType(now);
  if (dt==="sunday") return null;
  const times=dt==="saturday"?dir.times.saturday:dir.times.weekday;
  const nowMin=now.getHours()*60+now.getMinutes(), nowSec=now.getSeconds();
  for (let i=0;i<times.length;i++) {
    const tMin=timeToMin(times[i]);
    if (tMin>=nowMin) return {time:times[i], secondsUntil:(tMin-nowMin)*60-nowSec, index:i};
  }
  return null;
}

function findNextByFilter(filterFn, now) {
  const dt=getDayType(now);
  const nowMin=now.getHours()*60+now.getMinutes(), nowSec=now.getSeconds();
  if (dt!=="sunday") {
    let best=null;
    for (const carrier of CARRIERS) for (const dir of carrier.directions) {
      if (!filterFn(dir)) continue;
      const times=dt==="saturday"?dir.times.saturday:dir.times.weekday;
      for (const t of times) {
        const tMin=timeToMin(t);
        if (tMin>=nowMin) {
          const diffMin=tMin-nowMin;
          if (!best||diffMin<best.minutesUntil)
            best={carrier,dir,time:t,minutesUntil:diffMin,secondsUntil:diffMin*60-nowSec,tomorrow:false};
        }
      }
    }
    if (best) return best;
  }
  // tomorrow fallback
  const tom=new Date(now); tom.setDate(tom.getDate()+1); tom.setHours(0,0,0,0);
  const dtTom=getDayType(tom);
  if (dtTom==="sunday") return null;
  let best=null;
  for (const carrier of CARRIERS) for (const dir of carrier.directions) {
    if (!filterFn(dir)) continue;
    const times=dtTom==="saturday"?dir.times.saturday:dir.times.weekday;
    if (!times.length) continue;
    const t=times[0], tMin=timeToMin(t);
    const secLeft=(24*60-nowMin)*60-nowSec;
    const secondsUntil=secLeft+tMin*60;
    if (!best||secondsUntil<best.secondsUntil)
      best={carrier,dir,time:t,minutesUntil:Math.floor(secondsUntil/60),secondsUntil,tomorrow:true};
  }
  return best;
}

function updateHeroCard(cardId,timeId,countdownId,whenId,cId,result) {
  const card=document.getElementById(cardId);
  card.classList.remove("no-bus","tomorrow");
  if (result) {
    if (result.tomorrow) card.classList.add("tomorrow");
    document.getElementById(timeId).textContent=result.time;
    document.getElementById(countdownId).textContent=`za ${formatCountdown(result.secondsUntil)}`;
    document.getElementById(whenId).textContent=result.tomorrow?"jutro":"dziś";
    document.getElementById(cId).textContent=result.carrier.name+(result.carrier.subtitle?` · ${result.carrier.subtitle}`:"");
  } else {
    card.classList.add("no-bus");
    document.getElementById(timeId).textContent="—";
    document.getElementById(countdownId).textContent="brak kursów";
    document.getElementById(whenId).textContent="";
    document.getElementById(cId).textContent="";
  }
}

// State
let carrierId=CARRIERS[0].id, directionId=CARRIERS[0].directions[0].id;
let isDark=true, dayOverride=null;

function getCarrier() { return CARRIERS.find(c=>c.id===carrierId); }
function getDirection() { const c=getCarrier(); return c.directions.find(d=>d.id===directionId)??c.directions[0]; }
function getEffectiveDayType() { return dayOverride!==null?dayOverride:getDayType(new Date()); }

function updatePill(segEl) {
  let pill=segEl.querySelector(".seg-pill");
  if (!pill) { pill=document.createElement("div"); pill.className="seg-pill"; segEl.insertBefore(pill,segEl.firstChild); }
  const active=segEl.querySelector(".seg-btn.active");
  if (!active){pill.style.display="none";return;}
  pill.style.display="";
  pill.style.left=active.offsetLeft+"px";
  pill.style.width=active.offsetWidth+"px";
}

function renderDayTabs() {
  const seg=document.getElementById("day-seg"); seg.innerHTML="";
  const realDay=getDayType(new Date());
  [{id:"weekday",label:"Pon–Pt"},{id:"saturday",label:"Sobota"}].forEach(d=>{
    const btn=document.createElement("button");
    const isActive=getEffectiveDayType()===d.id;
    const isToday=realDay===d.id&&dayOverride===null;
    btn.className="seg-btn"+(isActive?" active":"");
    btn.innerHTML=`<span>${d.label}</span>${isToday?`<span class="sub">dziś</span>`:""}`;
    btn.onclick=()=>{dayOverride=d.id;renderDayTabs();renderScheduleAnimated();};
    seg.appendChild(btn);
  });
  requestAnimationFrame(()=>updatePill(seg));
}

function renderCarrierTabs() {
  const seg=document.getElementById("carrier-seg"); seg.innerHTML="";
  CARRIERS.forEach(c=>{
    const btn=document.createElement("button");
    btn.className="seg-btn"+(c.id===carrierId?" active":"");
    btn.innerHTML=`<span>${c.name}</span>${c.subtitle?`<span class="sub">${c.subtitle}</span>`:""}`;
    btn.onclick=()=>{
      carrierId=c.id;
      if (!getCarrier().directions.find(d=>d.id===directionId)) directionId=getCarrier().directions[0].id;
      renderCarrierTabs(); renderDirectionTabs(); renderScheduleAnimated();
    };
    seg.appendChild(btn);
  });
  requestAnimationFrame(()=>updatePill(seg));
}

function renderDirectionTabs() {
  const seg=document.getElementById("direction-seg"); seg.innerHTML="";
  getCarrier().directions.forEach(d=>{
    const btn=document.createElement("button");
    btn.className="seg-btn dir-btn"+(d.id===directionId?" active":"");
    btn.textContent=`${d.from}  →  ${d.to}`;
    btn.onclick=()=>{directionId=d.id;renderDirectionTabs();renderScheduleAnimated();};
    seg.appendChild(btn);
  });
  requestAnimationFrame(()=>updatePill(seg));
}

function triggerBus(onMidpoint) {
  const bus=document.getElementById("bus-transition");
  bus.classList.remove("driving"); void bus.offsetWidth; bus.classList.add("driving");
  setTimeout(onMidpoint,340);
  bus.addEventListener("animationend",()=>bus.classList.remove("driving"),{once:true});
}

function renderScheduleAnimated() {
  const c=document.getElementById("schedule-container");
  triggerBus(()=>{ c.classList.add("fade-out"); renderSchedule(); requestAnimationFrame(()=>c.classList.remove("fade-out")); });
}

function renderSchedule() {
  const now=new Date(), dt=getEffectiveDayType(), isLive=dayOverride===null;
  const dir=getDirection(), carrier=getCarrier();
  document.getElementById("schedule-label").textContent=`ROZKŁAD · ${getDayLabel(dt).toUpperCase()}`;
  const times=dt==="sunday"?[]:(dt==="saturday"?dir.times.saturday:dir.times.weekday);
  document.getElementById("count-badge").textContent=times.length;
  const container=document.getElementById("schedule-container"); container.innerHTML="";
  if (dt==="sunday") { container.innerHTML=`<div class="empty-card"><div class="empty-icon">○</div><div class="empty-title">Niedziela</div><div class="empty-text">W niedzielę busy nie kursują</div></div>`; return; }
  if (!times.length) { const n=carrier.name+(carrier.subtitle?` ${carrier.subtitle}`:""); container.innerHTML=`<div class="empty-card"><div class="empty-icon">—</div><div class="empty-title">Brak kursów</div><div class="empty-text">${n} nie kursuje w ${dt==="saturday"?"soboty":"dni powszednie"}</div></div>`; return; }
  const nowMin=now.getHours()*60+now.getMinutes();
  const nextInDir=isLive?findNextInDir(dir,now):null;
  const grid=document.createElement("div"); grid.className="time-grid";
  times.forEach((t,idx)=>{
    const tMin=timeToMin(t), isPast=isLive&&tMin<nowMin;
    const isNext=isLive&&nextInDir&&nextInDir.index===idx&&nextInDir.time===t;
    const cell=document.createElement("div");
    cell.className="time-cell"+(isPast?" past":"")+(isNext?" next":"");
    const te=document.createElement("div"); te.className="time-text"; te.textContent=t; cell.appendChild(te);
    if (isNext) { const b=document.createElement("div"); b.className="next-badge"; b.id="next-badge-live"; b.textContent=`ZA ${formatCountdown(nextInDir.secondsUntil)}`; cell.appendChild(b); }
    grid.appendChild(cell);
  });
  container.appendChild(grid);
}

function tick() {
  const now=new Date(), dt=getDayType(now);
  document.getElementById("header-sub").textContent=`${getDayLabel(dt)} · ${now.toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"})}`;
  document.getElementById("date-chip").textContent=now.toLocaleDateString("pl-PL",{weekday:"long",day:"numeric",month:"long"}).toUpperCase();
  updateHeroCard("hero-to-kielce","hk-time","hk-countdown","hk-when","hk-carrier",findNextByFilter(d=>d.to==="Kielce",now));
  updateHeroCard("hero-from-kielce","hfk-time","hfk-countdown","hfk-when","hfk-carrier",findNextByFilter(d=>d.from==="Kielce",now));
  const nextInDir=findNextInDir(getDirection(),now);
  const badge=document.getElementById("next-badge-live");
  if (badge&&nextInDir) badge.textContent=`ZA ${formatCountdown(nextInDir.secondsUntil)}`;
  if (now.getSeconds()===0) renderSchedule();
}

document.getElementById("theme-btn").onclick=()=>{
  isDark=!isDark;
  document.body.classList.toggle("light",!isDark);
  document.getElementById("theme-btn").textContent=isDark?"☀":"☾";
  document.getElementById("theme-color-meta").content=isDark?"#09090B":"#FFFFFF";
};

// PWA service worker
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
