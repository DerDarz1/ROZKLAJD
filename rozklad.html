<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rozkład Busów</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #09090B;
      --surface:  #18181B;
      --raised:   #27272A;
      --text:     #FAFAFA;
      --muted:    #A1A1AA;
      --border:   #27272A;
      --live:     #34D399;
      --live-bg:  #064E3B;
      --past:     #52525B;
    }
    body.light {
      --bg:       #FFFFFF;
      --surface:  #F4F4F5;
      --raised:   #E4E4E7;
      --text:     #09090B;
      --muted:    #71717A;
      --border:   #E4E4E7;
      --live:     #10B981;
      --live-bg:  #ECFDF5;
      --past:     #A1A1AA;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      font-family: monospace;
    }
    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }
    #theme-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* MAIN */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* HERO — dwa kafelki */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .hero-card {
      border: 1.5px solid var(--live);
      background: var(--live-bg);
      border-radius: 8px;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 3px;
    }
    .hero-card.no-bus {
      border-color: var(--border);
      background: var(--surface);
    }
    .hero-card.tomorrow {
      border-color: var(--border);
      background: var(--surface);
    }
    .hero-label-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--live);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    .hero-card.no-bus .live-dot,
    .hero-card.tomorrow .live-dot { background: var(--muted); animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .hero-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--live);
    }
    .hero-card.no-bus .hero-label,
    .hero-card.tomorrow .hero-label { color: var(--muted); }
    .hero-time {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      font-family: monospace;
    }
    .hero-card.no-bus .hero-time { color: var(--muted); }
    .hero-countdown {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }
    .hero-when {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }
    .hero-carrier {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* DATE CHIP */
    .date-chip {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      font-weight: 700;
      margin-top: 24px;
      display: block;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      margin-top: 20px;
      margin-bottom: 10px;
      display: block;
    }

    /* SEGMENTED CONTROL */
    .segmented {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      gap: 2px;
    }
    .seg-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .seg-btn .sub {
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .seg-btn.active {
      background: var(--bg);
      border-color: var(--border);
      color: var(--text);
    }
    .seg-btn.dir-btn {
      font-size: 12px;
      font-weight: 700;
      padding: 12px 8px;
      flex-direction: row;
      gap: 0;
      letter-spacing: 0.5px;
    }

    /* LIST HEADER */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      margin-bottom: 10px;
    }
    .count-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      letter-spacing: 1px;
    }

    /* BUS TRANSITION */
    #bus-transition {
      position: fixed;
      top: 50%;
      left: -160px;
      transform: translateY(-50%);
      font-size: 80px;
      line-height: 1;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
      filter: drop-shadow(0 4px 24px #000a);
      transition: none;
    }
    #bus-transition.driving {
      animation: bus-drive 0.72s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes bus-drive {
      0%   { left: -160px; }
      45%  { left: calc(50% - 40px); }
      55%  { left: calc(50% - 40px); }
      100% { left: calc(100vw + 160px); }
    }

    /* SCHEDULE TRANSITION */
    #schedule-container {
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #schedule-container.fade-out {
      opacity: 0;
      transform: translateY(6px);
    }
    #schedule-container.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    /* Sliding pill inside segmented control */
    .segmented {
      position: relative;
    }
    .seg-pill {
      position: absolute;
      top: 4px;
      bottom: 4px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: left 0.22s cubic-bezier(0.4,0,0.2,1), width 0.22s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
      z-index: 0;
    }
    .seg-btn {
      position: relative;
      z-index: 1;
    }
    /* Remove the per-button active background since pill handles it */
    .seg-btn.active {
      background: transparent !important;
      border-color: transparent !important;
    }

    /* TIME GRID */
    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .time-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .time-cell.past {
      opacity: 0.3;
      background: var(--bg);
    }
    .time-cell.next {
      background: var(--live);
      border-color: var(--live);
    }
    .time-text {
      font-size: 18px;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: -0.5px;
    }
    .time-cell.past .time-text {
      color: var(--past);
      text-decoration: line-through;
    }
    .time-cell.next .time-text {
      color: #052E16;
    }
    .next-badge {
      font-size: 9px;
      font-weight: 800;
      color: #052E16;
      letter-spacing: 0.8px;
      margin-top: 3px;
    }

    /* EMPTY STATE */
    .empty-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: var(--surface);
      text-align: center;
    }
    .empty-icon { font-size: 32px; color: var(--muted); }
    .empty-title { font-size: 18px; font-weight: 800; margin-top: 12px; }
    .empty-text { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* FOOTER */
    footer {
      margin-top: 32px;
      text-align: center;
    }
    .footer-text {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      font-weight: 700;
    }
    .footer-small {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div id="bus-transition">🚌</div>

<header>
  <div>
    <div class="header-title">ROZKŁAD</div>
    <div class="header-sub" id="header-sub"></div>
  </div>
  <button id="theme-btn" title="Zmień motyw">☀</button>
</header>

<main>
  <!-- HERO — dwa kafelki: do Kielc / z Kielc -->
  <div class="hero-grid">
    <div class="hero-card" id="hero-to-kielce">
      <div class="hero-label-row">
        <div class="live-dot"></div>
        <span class="hero-label">DO KIELC</span>
      </div>
      <div class="hero-time" id="hk-time">—</div>
      <div class="hero-countdown" id="hk-countdown"></div>
      <div class="hero-when" id="hk-when"></div>
      <div class="hero-carrier" id="hk-carrier"></div>
    </div>
    <div class="hero-card" id="hero-from-kielce">
      <div class="hero-label-row">
        <div class="live-dot"></div>
        <span class="hero-label">Z KIELC</span>
      </div>
      <div class="hero-time" id="hfk-time">—</div>
      <div class="hero-countdown" id="hfk-countdown"></div>
      <div class="hero-when" id="hfk-when"></div>
      <div class="hero-carrier" id="hfk-carrier"></div>
    </div>
  </div>

  <!-- DATE -->
  <span class="date-chip" id="date-chip"></span>

  <!-- DAY TYPE -->
  <span class="section-label">DZIEŃ</span>
  <div class="segmented" id="day-seg"></div>

  <!-- CARRIER -->
  <span class="section-label">PRZEWOŹNIK</span>
  <div class="segmented" id="carrier-seg"></div>

  <!-- DIRECTION -->
  <span class="section-label">KIERUNEK</span>
  <div class="segmented" id="direction-seg"></div>

  <!-- SCHEDULE -->
  <div class="list-header">
    <span class="section-label" id="schedule-label" style="margin:0"></span>
    <span class="count-badge" id="count-badge">0</span>
  </div>
  <div id="schedule-container"></div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-text">Dane rozkładowe · KOWMAR · MAJCHRAK</div>
    <div class="footer-small">Kursy orientacyjne — potwierdź u przewoźnika</div>
  </footer>
</main>

<script>
const CARRIERS = [
  {
    id: "kowmar-zwykly", name: "KOWMAR", subtitle: "zwykły",
    directions: [
      { id: "kz-ruda-kielce", from: "Ruda", to: "Kielce",
        times: { weekday: ["4:45","5:30","6:20","6:40","6:55","7:50","8:45","10:20","12:05","13:00","13:50","14:45","15:30","16:00","17:15","17:55","20:00"], saturday: ["4:45","6:30","8:15","10:15","12:20","14:20","16:00"] } },
      { id: "kz-kielce-ruda", from: "Kielce", to: "Ruda",
        times: { weekday: ["6:15","7:05","7:45","9:10","10:25","12:15","13:05","13:55","14:35","15:10","15:50","16:25","17:15","18:30","19:10","20:50"], saturday: ["5:30","7:20","9:15","11:25","13:20","15:10","17:15"] } },
    ]
  },
  {
    id: "kowmar-szybki", name: "KOWMAR", subtitle: "szybki",
    directions: [
      { id: "ks-ruda-kielce", from: "Ruda", to: "Kielce",
        times: { weekday: ["6:05","8:15","11:00","13:15","15:30"], saturday: [] } },
      { id: "ks-kielce-ruda", from: "Kielce", to: "Ruda",
        times: { weekday: ["5:30","6:45","8:55","11:45","14:50"], saturday: [] } },
    ]
  },
  {
    id: "majchrak", name: "MAJCHRAK", subtitle: "",
    directions: [
      { id: "m-kielce-wolka", from: "Kielce", to: "Wólka Kłucka",
        times: { weekday: ["6:00","7:15","8:00","9:20","10:35","12:25","13:45","15:15","16:30","17:45","18:50"], saturday: ["7:00","8:50","11:40","14:00","16:10","18:50"] } },
      { id: "m-wolka-kielce", from: "Wólka Kłucka", to: "Kielce",
        times: { weekday: ["5:05","6:15","8:15","10:15","12:25","13:25","14:45","16:00","17:20"], saturday: ["5:50","7:50","10:20","13:10","15:10","17:50"] } },
    ]
  }
];

function timeToMin(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

function formatCountdown(sec) {
  if (sec <= 0) return "teraz";
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}g ${m}min`;
  if (m > 0) return `${m}min ${s}s`;
  return `${s}s`;
}

function getDayType(d) {
  const day = d.getDay();
  if (day === 0) return "sunday";
  if (day === 6) return "saturday";
  return "weekday";
}

function getDayLabel(dt) {
  if (dt === "weekday") return "Poniedziałek–Piątek";
  if (dt === "saturday") return "Sobota";
  return "Niedziela";
}

function findGlobalNext(now) {
  const dt = getDayType(now);
  if (dt === "sunday") return null;
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const nowSec = now.getSeconds();
  let best = null;
  for (const carrier of CARRIERS) {
    for (const dir of carrier.directions) {
      const times = dt === "saturday" ? dir.times.saturday : dir.times.weekday;
      for (const t of times) {
        const tMin = timeToMin(t);
        if (tMin >= nowMin) {
          const diffMin = tMin - nowMin;
          if (!best || diffMin < best.minutesUntil) {
            best = { carrier, direction: dir, time: t, minutesUntil: diffMin, secondsUntil: diffMin * 60 - nowSec };
          }
        }
      }
    }
  }
  return best;
}

function findNextInDir(dir, now) {
  const dt = getDayType(now);
  if (dt === "sunday") return null;
  const times = dt === "saturday" ? dir.times.saturday : dir.times.weekday;
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const nowSec = now.getSeconds();
  for (let i = 0; i < times.length; i++) {
    const tMin = timeToMin(times[i]);
    if (tMin >= nowMin) {
      return { time: times[i], secondsUntil: (tMin - nowMin) * 60 - nowSec, index: i };
    }
  }
  return null;
}

// Find next bus matching a filter fn (dir => bool), with tomorrow fallback
function findNextByFilter(filterFn, now) {
  const dt = getDayType(now);
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const nowSec = now.getSeconds();

  // Try today first (skip sunday)
  if (dt !== "sunday") {
    let best = null;
    for (const carrier of CARRIERS) {
      for (const dir of carrier.directions) {
        if (!filterFn(dir)) continue;
        const times = dt === "saturday" ? dir.times.saturday : dir.times.weekday;
        for (const t of times) {
          const tMin = timeToMin(t);
          if (tMin >= nowMin) {
            const diffMin = tMin - nowMin;
            if (!best || diffMin < best.minutesUntil) {
              best = { carrier, dir, time: t, minutesUntil: diffMin,
                secondsUntil: diffMin * 60 - nowSec, tomorrow: false };
            }
          }
        }
      }
    }
    if (best) return best;
  }

  // Fallback: tomorrow
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const dtTomorrow = getDayType(tomorrow);
  if (dtTomorrow === "sunday") return null;

  let best = null;
  for (const carrier of CARRIERS) {
    for (const dir of carrier.directions) {
      if (!filterFn(dir)) continue;
      const times = dtTomorrow === "saturday" ? dir.times.saturday : dir.times.weekday;
      if (!times.length) continue;
      const t = times[0]; // first bus tomorrow
      const tMin = timeToMin(t);
      // seconds until = remaining today + minutes into tomorrow
      const secondsLeftToday = (24 * 60 - nowMin) * 60 - nowSec;
      const secondsUntil = secondsLeftToday + tMin * 60;
      if (!best || secondsUntil < best.secondsUntil) {
        best = { carrier, dir, time: t, minutesUntil: Math.floor(secondsUntil / 60),
          secondsUntil, tomorrow: true };
      }
    }
  }
  return best;
}

function updateHeroCard(cardId, timeId, countdownId, whenId, carrierId, result) {
  const card = document.getElementById(cardId);
  card.classList.remove("no-bus", "tomorrow");
  if (result) {
    if (result.tomorrow) card.classList.add("tomorrow");
    document.getElementById(timeId).textContent = result.time;
    document.getElementById(countdownId).textContent = `za ${formatCountdown(result.secondsUntil)}`;
    document.getElementById(whenId).textContent = result.tomorrow ? "jutro" : "dziś";
    document.getElementById(carrierId).textContent =
      result.carrier.name + (result.carrier.subtitle ? ` · ${result.carrier.subtitle}` : "");
  } else {
    card.classList.add("no-bus");
    document.getElementById(timeId).textContent = "—";
    document.getElementById(countdownId).textContent = "brak kursów";
    document.getElementById(whenId).textContent = "";
    document.getElementById(carrierId).textContent = "";
  }
}

// --- State ---
let carrierId = CARRIERS[0].id;
let directionId = CARRIERS[0].directions[0].id;
let isDark = true;
let dayOverride = null; // null = auto (today), "weekday" or "saturday" = manual

function getCarrier() { return CARRIERS.find(c => c.id === carrierId); }
function getDirection() {
  const c = getCarrier();
  return c.directions.find(d => d.id === directionId) ?? c.directions[0];
}
function getEffectiveDayType() {
  return dayOverride !== null ? dayOverride : getDayType(new Date());
}

// --- Sliding pill helper ---
function updatePill(segEl) {
  let pill = segEl.querySelector(".seg-pill");
  if (!pill) {
    pill = document.createElement("div");
    pill.className = "seg-pill";
    segEl.insertBefore(pill, segEl.firstChild);
  }
  const activeBtn = segEl.querySelector(".seg-btn.active");
  if (!activeBtn) { pill.style.display = "none"; return; }
  pill.style.display = "";
  // Position relative to the segmented container (which has padding:4px)
  pill.style.left = activeBtn.offsetLeft + "px";
  pill.style.width = activeBtn.offsetWidth + "px";
}

// --- Render day tabs ---
function renderDayTabs() {
  const seg = document.getElementById("day-seg");
  seg.innerHTML = "";
  const realDay = getDayType(new Date());
  const days = [
    { id: "weekday", label: "Pon–Pt" },
    { id: "saturday", label: "Sobota" },
  ];
  for (const d of days) {
    const btn = document.createElement("button");
    const isActive = getEffectiveDayType() === d.id;
    const isToday = realDay === d.id && dayOverride === null;
    btn.className = "seg-btn" + (isActive ? " active" : "");
    btn.innerHTML = `<span>${d.label}</span>${isToday ? `<span class="sub">dziś</span>` : ""}`;
    btn.onclick = () => {
      dayOverride = d.id;
      renderDayTabs();
      renderScheduleAnimated();
    };
    seg.appendChild(btn);
  }
  requestAnimationFrame(() => updatePill(seg));
}

// --- Render carrier tabs ---
function renderCarrierTabs() {
  const seg = document.getElementById("carrier-seg");
  seg.innerHTML = "";
  for (const c of CARRIERS) {
    const btn = document.createElement("button");
    btn.className = "seg-btn" + (c.id === carrierId ? " active" : "");
    btn.innerHTML = `<span>${c.name}</span>${c.subtitle ? `<span class="sub">${c.subtitle}</span>` : ""}`;
    btn.onclick = () => {
      carrierId = c.id;
      const newCarrier = getCarrier();
      if (!newCarrier.directions.find(d => d.id === directionId)) {
        directionId = newCarrier.directions[0].id;
      }
      renderCarrierTabs();
      renderDirectionTabs();
      renderScheduleAnimated();
    };
    seg.appendChild(btn);
  }
  requestAnimationFrame(() => updatePill(seg));
}

// --- Render direction tabs ---
function renderDirectionTabs() {
  const seg = document.getElementById("direction-seg");
  seg.innerHTML = "";
  const c = getCarrier();
  for (const d of c.directions) {
    const btn = document.createElement("button");
    btn.className = "seg-btn dir-btn" + (d.id === directionId ? " active" : "");
    btn.textContent = `${d.from}  →  ${d.to}`;
    btn.onclick = () => {
      directionId = d.id;
      renderDirectionTabs();
      renderScheduleAnimated();
    };
    seg.appendChild(btn);
  }
  requestAnimationFrame(() => updatePill(seg));
}

// --- Bus transition ---
function triggerBus(onMidpoint) {
  const bus = document.getElementById("bus-transition");
  bus.classList.remove("driving");
  void bus.offsetWidth; // reflow to restart animation
  bus.classList.add("driving");
  // swap content at the midpoint (when bus is centre-screen)
  setTimeout(onMidpoint, 340);
  bus.addEventListener("animationend", () => bus.classList.remove("driving"), { once: true });
}

// --- Animated schedule swap ---
function renderScheduleAnimated() {
  const container = document.getElementById("schedule-container");
  triggerBus(() => {
    container.classList.add("fade-out");
    renderSchedule();
    requestAnimationFrame(() => {
      container.classList.remove("fade-out");
    });
  });
}

// --- Render schedule grid ---
function renderSchedule() {
  const now = new Date();
  const dt = getEffectiveDayType();
  const isLive = dayOverride === null;
  const dayLabel = getDayLabel(dt);
  const dir = getDirection();
  const carrier = getCarrier();

  document.getElementById("schedule-label").textContent =
    `ROZKŁAD · ${dayLabel.toUpperCase()}`;

  const times = dt === "sunday" ? [] : (dt === "saturday" ? dir.times.saturday : dir.times.weekday);
  document.getElementById("count-badge").textContent = times.length;

  const container = document.getElementById("schedule-container");
  container.innerHTML = "";

  if (dt === "sunday") {
    container.innerHTML = `<div class="empty-card"><div class="empty-icon">○</div><div class="empty-title">Niedziela</div><div class="empty-text">W niedzielę busy nie kursują</div></div>`;
    return;
  }
  if (times.length === 0) {
    const name = carrier.name + (carrier.subtitle ? ` ${carrier.subtitle}` : "");
    const when = dt === "saturday" ? "soboty" : "dni powszednie";
    container.innerHTML = `<div class="empty-card"><div class="empty-icon">—</div><div class="empty-title">Brak kursów</div><div class="empty-text">${name} nie kursuje w ${when}</div></div>`;
    return;
  }

  const nowMin = now.getHours() * 60 + now.getMinutes();
  // Only show past/next highlighting when viewing today's real schedule
  const nextInDir = isLive ? findNextInDir(dir, now) : null;
  const grid = document.createElement("div");
  grid.className = "time-grid";

  times.forEach((t, idx) => {
    const tMin = timeToMin(t);
    const isPast = isLive && tMin < nowMin;
    const isNext = isLive && nextInDir && nextInDir.index === idx && nextInDir.time === t;

    const cell = document.createElement("div");
    cell.className = "time-cell" + (isPast ? " past" : "") + (isNext ? " next" : "");

    const timeEl = document.createElement("div");
    timeEl.className = "time-text";
    timeEl.textContent = t;
    cell.appendChild(timeEl);

    if (isNext) {
      const badge = document.createElement("div");
      badge.className = "next-badge";
      badge.id = "next-badge-live";
      badge.textContent = `ZA ${formatCountdown(nextInDir.secondsUntil)}`;
      cell.appendChild(badge);
    }
    grid.appendChild(cell);
  });

  container.appendChild(grid);
}

// --- Update hero + clock every second ---
function tick() {
  const now = new Date();
  const dt = getDayType(now);
  const dayLabel = getDayLabel(dt);

  const timeStr = now.toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("header-sub").textContent = `${dayLabel} · ${timeStr}`;

  const dateStr = now.toLocaleDateString("pl-PL", { weekday: "long", day: "numeric", month: "long" });
  document.getElementById("date-chip").textContent = dateStr.toUpperCase();

  // Hero: do Kielc — kierunki gdzie .to === "Kielce"
  updateHeroCard(
    "hero-to-kielce", "hk-time", "hk-countdown", "hk-when", "hk-carrier",
    findNextByFilter(d => d.to === "Kielce", now)
  );
  // Hero: z Kielc — kierunki gdzie .from === "Kielce"
  updateHeroCard(
    "hero-from-kielce", "hfk-time", "hfk-countdown", "hfk-when", "hfk-carrier",
    findNextByFilter(d => d.from === "Kielce", now)
  );

  // Update next-badge countdown live
  const dir = getDirection();
  const nextInDir = findNextInDir(dir, now);
  const badge = document.getElementById("next-badge-live");
  if (badge && nextInDir) {
    badge.textContent = `ZA ${formatCountdown(nextInDir.secondsUntil)}`;
  }

  // Re-render grid every minute
  if (now.getSeconds() === 0) renderSchedule();
}

// --- Theme toggle ---
document.getElementById("theme-btn").onclick = () => {
  isDark = !isDark;
  document.body.classList.toggle("light", !isDark);
  document.getElementById("theme-btn").textContent = isDark ? "☀" : "☾";
};

// --- Init ---
// Pre-select today's day tab
dayOverride = getDayType(new Date()) === "sunday" ? "weekday" : getDayType(new Date());
renderDayTabs();
renderCarrierTabs();
renderDirectionTabs();
renderSchedule();
tick();
setInterval(tick, 1000);
</script>
