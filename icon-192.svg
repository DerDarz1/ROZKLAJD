<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- bus body -->
  <rect x="36" y="54" width="120" height="80" rx="12" fill="#FFFFFF"/>
  <!-- windshield -->
  <rect x="48" y="64" width="96" height="44" rx="6" fill="#1E3A8A"/>
  <!-- wheels -->
  <circle cx="62" cy="138" r="14" fill="#1E3A8A"/>
  <circle cx="62" cy="138" r="7" fill="#FFFFFF"/>
  <circle cx="130" cy="138" r="14" fill="#1E3A8A"/>
  <circle cx="130" cy="138" r="7" fill="#FFFFFF"/>
  <!-- headlights -->
  <rect x="38" y="100" width="16" height="10" rx="3" fill="#FCD34D"/>
  <!-- clock circle -->
  <circle cx="138" cy="118" r="26" fill="#1E3A8A" stroke="#FFFFFF" stroke-width="4"/>
  <line x1="138" y1="104" x2="138" y2="118" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="138" y1="118" x2="148" y2="124" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <!-- speed lines -->
  <line x1="18" y1="88" x2="34" y2="88" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity=".7"/>
  <line x1="14" y1="100" x2="34" y2="100" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity=".5"/>
  <line x1="20" y1="112" x2="34" y2="112" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity=".3"/>
  <!-- text -->
  <text x="96" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="18" fill="#FFFFFF" letter-spacing="2">ROZKŁAD</text>
</svg>
